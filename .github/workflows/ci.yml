name: CI - Lint, Test & Cypress

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install "uvicorn[standard]"

    - name: Lint with Ruff
      run: ruff check . --output-format=github

    - name: Run pytest unit tests
      run: python -m pytest tests/ -v

    # Debug: Verificar si uvicorn está disponible
    - name: Debug - Check uvicorn version
      run: python -m uvicorn --version || echo "Uvicorn not found"

    # Cypress con más debug y timeout extendido
    - name: Cypress run (API E2E)
      uses: cypress-io/github-action@v6
      with:
        install: true               # fuerza npm install
        start: python -m uvicorn src.main:app --host 0.0.0.0 --port 8000
        wait-on: 'http://localhost:8000'
        wait-on-timeout: 180        # subimos a 3 minutos
        wait-on-scheme: http
        browser: chrome
        headless: true
        spec: cypress/e2e/api.cy.js   # asegúrate que el nombre coincida exactamente
        config-file: cypress.config.js
      env:
        CYPRESS_baseUrl: http://localhost:8000
        CYPRESS_video: false        # opcional: ahorra tiempo

    # Debug extra si Cypress falla
    - name: Debug - Show Cypress logs if failed
      if: failure()
      run: |
        ls -la cypress/ || true
        cat cypress/videos/* || true   # si hay videos