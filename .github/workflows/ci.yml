name: CI - Lint, Tests & Cypress E2E

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "uvicorn[standard]"

      - name: Lint with Ruff 
        run: ruff check . || true   # || true avoid warning exit code

      - name: Run pytest unit tests
        run: python -m pytest tests/ -v

      # Start Uvicorn in background + wait manually
      - name: Start Uvicorn server in background
        run: python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 &

      - name: Wait for server to be ready
        run: |
          for i in {1..30}; do
            curl -s -f http://localhost:8000 || sleep 2
          done
          curl -s http://localhost:8000/todos/  # Final check

      # Cypress: v7 + sin inputs inválidos
      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v7
        with:
          browser: chrome
          spec: cypress/e2e/api.cy.js   # confirma nombre exacto
          config-file: cypress.config.js
          working-directory: .
          env: |
            CYPRESS_baseUrl=http://localhost:8000
        env:
          CYPRESS_VIDEO: false  # Saves resources by not recording video in CI

      # Debug si falla
      - name: Debug on failure
        if: failure()
        run: |
          echo "Server check:"
          curl http://localhost:8000 || echo "Server not responding"
          echo "Processes:"
          ps aux | grep uvicorn || true